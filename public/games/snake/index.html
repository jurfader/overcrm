<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Snake</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0c1222;
      color: #e4e8f0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 480px;
    }
    .title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: -0.02em;
    }
    .stats {
      display: flex;
      gap: 24px;
      font-size: 0.875rem;
      font-weight: 500;
      color: #64748b;
    }
    .stats span { color: #e2e8f0; }
    .arena {
      position: relative;
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
    }
    #gameCanvas {
      display: block;
      background: #0f172a;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 480px;
    }
    .difficulty {
      display: flex;
      gap: 4px;
      padding: 4px;
      background: #1e293b;
      border-radius: 8px;
      border: 1px solid #334155;
    }
    .difficulty button {
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: #64748b;
      cursor: pointer;
      font-size: 0.8125rem;
      font-weight: 500;
      font-family: inherit;
      transition: all 0.15s ease;
    }
    .difficulty button:hover { color: #94a3b8; background: #334155; }
    .difficulty button.active { background: #334155; color: #e2e8f0; }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.92);
      border-radius: 8px;
      text-align: center;
      padding: 32px;
    }
    .overlay.hidden { display: none; }
    .overlay-title {
      font-size: 1rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }
    .overlay-sub {
      font-size: 0.8125rem;
      color: #64748b;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .overlay-score {
      font-size: 2.5rem;
      font-weight: 700;
      color: #e2e8f0;
      letter-spacing: -0.03em;
      margin: 8px 0 24px;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn-primary {
      background: #3b82f6;
      color: #fff;
    }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary {
      background: #334155;
      color: #e2e8f0;
    }
    .btn-secondary:hover { background: #475569; }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="header">
      <h1 class="title">Snake</h1>
      <div class="stats">
        <span>Wynik: <strong id="score">0</strong></span>
        <span>Poziom: <strong id="level">1</strong></span>
      </div>
    </div>

    <div class="arena">
      <canvas id="gameCanvas" width="480" height="480"></canvas>

      <div class="overlay" id="startHint">
        <p class="overlay-title">Gotowy do gry</p>
        <p class="overlay-sub">Użyj strzałek na klawiaturze,<br>aby sterować wężem.</p>
        <p class="overlay-sub" style="margin-bottom:0; font-size:0.75rem; opacity:0.8">Naciśnij dowolną strzałkę, aby rozpocząć</p>
      </div>

      <div class="overlay hidden" id="gameOver">
        <p class="overlay-title">Koniec gry</p>
        <p class="overlay-score"><span id="finalScore">0</span></p>
        <button type="button" class="btn btn-primary" id="restart">Rozpocznij ponownie</button>
      </div>
    </div>

    <div class="controls">
      <div class="difficulty" id="difficulty">
        <button type="button" data-speed="120" class="active">Łatwy</button>
        <button type="button" data-speed="90">Średni</button>
        <button type="button" data-speed="65">Trudny</button>
      </div>
    </div>
  </div>

  <script>
    const GAME_ID = 'snake';
    const CELL = 24;
    const COLS = 20;
    const ROWS = 20;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level');
    const gameOverEl = document.getElementById('gameOver');
    const finalScoreEl = document.getElementById('finalScore');
    const restartBtn = document.getElementById('restart');

    let snake = [{ x: 10, y: 10 }];
    let food = { x: 5, y: 5 };
    let dir = { x: 0, y: 0 };
    let nextDir = { x: 0, y: 0 };
    let score = 0;
    let level = 1;
    let gameLoop = null;
    let headImage = null;
    let gameStarted = false;
    let speedMs = 120;

    function loadHeadImage() {
      fetch('/games/snake/settings', { credentials: 'same-origin' })
        .then(r => r.json())
        .then(data => {
          if (data?.head_image) {
            const img = new Image();
            img.onload = () => { headImage = img; redraw(); };
            img.src = data.head_image;
          }
        })
        .catch(() => {});
    }

    function placeFood() {
      let ok = false;
      while (!ok) {
        food.x = Math.floor(Math.random() * COLS);
        food.y = Math.floor(Math.random() * ROWS);
        ok = !snake.some(s => s.x === food.x && s.y === food.y);
      }
    }

    function drawGrid() {
      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = 1;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath();
        ctx.moveTo(i * CELL, 0);
        ctx.lineTo(i * CELL, ROWS * CELL);
        ctx.stroke();
      }
      for (let j = 0; j <= ROWS; j++) {
        ctx.beginPath();
        ctx.moveTo(0, j * CELL);
        ctx.lineTo(COLS * CELL, j * CELL);
        ctx.stroke();
      }
    }

    function drawCell(x, y, isHead) {
      const px = x * CELL;
      const py = y * CELL;
      const pad = 1;
      if (isHead && headImage) {
        ctx.drawImage(headImage, px + pad, py + pad, CELL - pad * 2, CELL - pad * 2);
      } else {
        ctx.fillStyle = isHead ? '#22c55e' : '#4ade80';
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(px + pad, py + pad, CELL - pad * 2, CELL - pad * 2, 3);
        else ctx.rect(px + pad, py + pad, CELL - pad * 2, CELL - pad * 2);
        ctx.fill();
        if (isHead) {
          ctx.strokeStyle = '#16a34a';
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }
    }

    function drawFood() {
      const cx = food.x * CELL + CELL / 2;
      const cy = food.y * CELL + CELL / 2;
      const r = CELL / 2 - 2;
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#dc2626';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function redraw() {
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      snake.forEach((s, i) => drawCell(s.x, s.y, i === 0));
      drawFood();
    }

    function gameOver() {
      clearInterval(gameLoop);
      gameLoop = null;
      gameStarted = false;
      finalScoreEl.textContent = score;
      gameOverEl.classList.remove('hidden');
      gameOverEl.classList.add('show');

      const csrf = decodeURIComponent((document.cookie.match(/XSRF-TOKEN=([^;]+)/) || [])[1] || '');
      fetch('/games/scores', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json', 'X-XSRF-TOKEN': csrf },
        credentials: 'include',
        body: JSON.stringify({ game_id: GAME_ID, score })
      }).then(() => {
        try { window.parent.postMessage({ type: 'gameScoreSubmitted', gameId: GAME_ID, score }, '*'); } catch (_) {}
      }).catch(() => {});
    }

    const startHintEl = document.getElementById('startHint');
    function resetGame() {
      startHintEl.classList.remove('hidden');
      gameOverEl.classList.add('hidden');
      gameOverEl.classList.remove('show');
      snake = [{ x: 10, y: 10 }];
      dir = { x: 0, y: 0 };
      nextDir = { x: 0, y: 0 };
      score = 0;
      level = 1;
      levelEl.textContent = '1';
      gameStarted = false;
      scoreEl.textContent = '0';
      placeFood();
      redraw();
    }

    restartBtn.addEventListener('click', resetGame);

    document.getElementById('difficulty').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-speed]');
      if (!btn || gameLoop) return;
      speedMs = parseInt(btn.dataset.speed, 10);
      document.querySelectorAll('.difficulty button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });

    function startGame() {
      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(tick, speedMs);
    }

    function tick() {
      dir = { ...nextDir };
      if (dir.x === 0 && dir.y === 0) return;
      const head = snake[0];
      const nx = (head.x + dir.x + COLS) % COLS;
      const ny = (head.y + dir.y + ROWS) % ROWS;

      if (snake.some(s => s.x === nx && s.y === ny)) {
        gameOver();
        return;
      }

      snake.unshift({ x: nx, y: ny });
      if (nx === food.x && ny === food.y) {
        score += 10;
        scoreEl.textContent = score;
        const newLevel = Math.floor(score / 80) + 1;
        if (newLevel > level) {
          level = newLevel;
          levelEl.textContent = level;
        }
        placeFood();
        if (gameLoop) {
          clearInterval(gameLoop);
          const faster = Math.max(45, speedMs - (level - 1) * 4);
          gameLoop = setInterval(tick, faster);
        }
      } else {
        snake.pop();
      }

      redraw();
    }

    document.addEventListener('keydown', (e) => {
      if (gameLoop) {
        if (e.key === 'ArrowUp' && dir.y !== 1) nextDir = { x: 0, y: -1 };
        else if (e.key === 'ArrowDown' && dir.y !== -1) nextDir = { x: 0, y: 1 };
        else if (e.key === 'ArrowLeft' && dir.x !== 1) nextDir = { x: -1, y: 0 };
        else if (e.key === 'ArrowRight' && dir.x !== -1) nextDir = { x: 1, y: 0 };
      } else if (!gameStarted && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
        startHintEl.classList.add('hidden');
        gameStarted = true;
        if (e.key === 'ArrowUp') nextDir = { x: 0, y: -1 };
        else if (e.key === 'ArrowDown') nextDir = { x: 0, y: 1 };
        else if (e.key === 'ArrowLeft') nextDir = { x: -1, y: 0 };
        else if (e.key === 'ArrowRight') nextDir = { x: 1, y: 0 };
        startGame();
      } else if (e.key === ' ' || e.key === 'Enter') {
        if (gameOverEl.classList.contains('show')) restartBtn.click();
      }
      e.preventDefault();
    });

    loadHeadImage();
    placeFood();
    window.addEventListener('message', (e) => {
      if (e?.data?.type === 'gameSettingsUpdated' && e.data?.gameId === 'snake') {
        loadHeadImage();
      }
    });
    redraw();
  </script>
</body>
</html>
