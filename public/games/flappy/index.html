<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flappy Chicken</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0c1222;
      color: #e4e8f0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .game-wrapper { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 400px;
    }
    .title { font-size: 1.25rem; font-weight: 600; color: #94a3b8; letter-spacing: -0.02em; }
    .score-display { font-size: 0.875rem; font-weight: 500; color: #64748b; }
    .score-display span { color: #e2e8f0; font-weight: 600; }
    .arena {
      position: relative;
      background: linear-gradient(180deg, #1e3a5f 0%, #0f172a 60%, #0a0f1a 100%);
      border: 1px solid #1e293b;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.03);
    }
    #gameCanvas {
      display: block;
      background: transparent;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(12, 18, 34, 0.9);
      text-align: center;
      padding: 32px;
    }
    .overlay.hidden { display: none; }
    .overlay-title { font-size: 1.125rem; font-weight: 600; color: #94a3b8; margin-bottom: 8px; }
    .overlay-sub { font-size: 0.8125rem; color: #64748b; line-height: 1.5; margin-bottom: 24px; }
    .overlay-score { font-size: 2.5rem; font-weight: 700; color: #e2e8f0; letter-spacing: -0.03em; margin: 8px 0 24px; }
    .btn {
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="header">
      <h1 class="title">Flappy Chicken</h1>
      <div class="score-display">Wynik: <span id="score">0</span></div>
    </div>
    <div class="arena">
      <canvas id="gameCanvas" width="400" height="500"></canvas>
      <div class="overlay" id="startHint">
        <p class="overlay-title">Gotowy do lotu</p>
        <p class="overlay-sub">Kliknij lub naciśnij spację,<br>żeby wzlecieć.</p>
        <p class="overlay-sub" style="margin-bottom:0; font-size:0.75rem; opacity:0.8">Omijaj rury!</p>
      </div>
      <div class="overlay hidden" id="gameOver">
        <p class="overlay-title">Wylądowałeś</p>
        <p class="overlay-score"><span id="finalScore">0</span></p>
        <button type="button" class="btn btn-primary" id="restart">Lecę ponownie</button>
      </div>
    </div>
  </div>

  <script>
    const GAME_ID = 'flappy';
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const W = 400, H = 500;
    const GRAVITY = 0.4;
    const FLAP = -8;
    const PIPE_GAP = 140;
    const PIPE_WIDTH = 60;
    const PIPE_SPEED = 3;
    const BIRD_R = 18;

    let bird = { x: 80, y: H/2, vy: 0 };
    let pipes = [];
    let score = 0;
    let gameLoop = null;
    let gameStarted = false;
    let frame = 0;

    const startHintEl = document.getElementById('startHint');
    const gameOverEl = document.getElementById('gameOver');
    const scoreEl = document.getElementById('score');
    const finalScoreEl = document.getElementById('finalScore');
    const restartBtn = document.getElementById('restart');

    function spawnPipe() {
      const minH = 80, maxH = H - PIPE_GAP - 80;
      const topH = minH + Math.random() * (maxH - minH);
      pipes.push({
        x: W,
        top: 0,
        topH,
        bottom: topH + PIPE_GAP,
        bottomH: H - topH - PIPE_GAP,
        passed: false
      });
    }

    function drawBird() {
      const { x, y } = bird;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(Math.atan2(bird.vy, 1) * 0.3);
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.ellipse(0, 0, BIRD_R, BIRD_R * 1.1, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#f59e0b';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = '#1e293b';
      ctx.beginPath();
      ctx.ellipse(6, -4, 4, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawPipe(pipe) {
      const cap = 12;
      ctx.fillStyle = '#22c55e';
      ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.topH);
      ctx.fillRect(pipe.x, pipe.bottom, PIPE_WIDTH, pipe.bottomH);
      ctx.fillStyle = '#16a34a';
      ctx.fillRect(pipe.x, pipe.topH - cap, PIPE_WIDTH + 4, cap);
      ctx.fillRect(pipe.x, pipe.bottom, PIPE_WIDTH + 4, cap);
    }

    function drawClouds() {
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      for (let i = 0; i < 5; i++) {
        const x = ((frame * 0.3 + i * 120) % (W + 80)) - 40;
        const y = 40 + (i % 3) * 60;
        ctx.beginPath();
        ctx.arc(x, y, 25, 0, Math.PI * 2);
        ctx.arc(x + 30, y, 30, 0, Math.PI * 2);
        ctx.arc(x + 55, y, 22, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function tick() {
      frame++;
      ctx.fillStyle = '#0c1222';
      ctx.fillRect(0, 0, W, H);
      drawClouds();

      if (!gameStarted) {
        drawBird();
        return;
      }

      bird.vy += GRAVITY;
      bird.y += bird.vy;

      if (frame % 90 === 0) spawnPipe();

      pipes = pipes.filter(p => {
        p.x -= PIPE_SPEED;
        if (p.x + PIPE_WIDTH < 0) return false;
        if (!p.passed && p.x + PIPE_WIDTH < bird.x) {
          p.passed = true;
          score++;
          scoreEl.textContent = score;
        }
        return true;
      });

      pipes.forEach(drawPipe);
      drawBird();

      if (bird.y - BIRD_R < 0 || bird.y + BIRD_R > H) return endGame();
      pipes.forEach(p => {
        if (bird.x + BIRD_R > p.x && bird.x - BIRD_R < p.x + PIPE_WIDTH) {
          if (bird.y - BIRD_R < p.topH || bird.y + BIRD_R > p.bottom) endGame();
        }
      });
    }

    function endGame() {
      clearInterval(gameLoop);
      gameLoop = null;
      gameStarted = false;
      finalScoreEl.textContent = score;
      gameOverEl.classList.remove('hidden');

      const csrf = decodeURIComponent((document.cookie.match(/XSRF-TOKEN=([^;]+)/) || [])[1] || '');
      fetch('/games/scores', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json', 'X-XSRF-TOKEN': csrf },
        credentials: 'include',
        body: JSON.stringify({ game_id: GAME_ID, score })
      }).then(() => {
        try { window.parent.postMessage({ type: 'gameScoreSubmitted', gameId: GAME_ID, score }, '*'); } catch (_) {}
      }).catch(() => {});
    }

    function flap() {
      if (!gameStarted && !gameOverEl.classList.contains('show')) {
        startHintEl.classList.add('hidden');
        gameStarted = true;
        bird.vy = FLAP;
        if (!gameLoop) gameLoop = setInterval(tick, 1000/60);
      } else if (gameStarted) {
        bird.vy = FLAP;
      }
    }

    function resetGame() {
      if (gameLoop) { clearInterval(gameLoop); gameLoop = null; }
      startHintEl.classList.add('hidden');
      gameOverEl.classList.add('hidden');
      bird = { x: 80, y: H/2, vy: 0 };
      pipes = [];
      score = 0;
      gameStarted = false;
      scoreEl.textContent = '0';
      frame = 0;
    }

    function startNewGame() {
      resetGame();
      gameStarted = true;
      startHintEl.classList.add('hidden');
      gameLoop = setInterval(tick, 1000/60);
    }

    restartBtn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      startNewGame();
    });

    document.addEventListener('keydown', e => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (!gameOverEl.classList.contains('hidden')) startNewGame();
        else flap();
      }
    });
    canvas.addEventListener('click', flap);
    startHintEl.addEventListener('click', flap);

    tick();
  </script>
</body>
</html>
