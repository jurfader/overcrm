<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Statki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0c1222;
      color: #e4e8f0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .game-wrapper { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .header { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 480px; }
    .title { font-size: 1.25rem; font-weight: 600; color: #94a3b8; letter-spacing: -0.02em; }
    .stats { display: flex; gap: 20px; font-size: 0.8125rem; font-weight: 500; color: #64748b; }
    .stats span { color: #e2e8f0; }
    .boards { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
    .board-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .board-label { font-size: 0.75rem; color: #64748b; }
    .board {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 2px;
      width: 220px;
      aspect-ratio: 1;
      background: #1e293b;
      padding: 6px;
      border-radius: 6px;
    }
    .cell {
      aspect-ratio: 1;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .cell.water { background: #0f172a; }
    .cell.ship { background: #334155; }
    .cell.hit { background: #ef4444; }
    .cell.miss { background: #475569; }
    .cell.enemy { background: #0f172a; }
    .cell.enemy:hover:not(.disabled) { background: #1e293b; }
    .board-wrap.disabled .cell.enemy { pointer-events: none; opacity: 0.7; }
    .cell.enemy.hit { background: #ef4444; }
    .cell.enemy.miss { background: #475569; }
    .cell.disabled { cursor: default; pointer-events: none; opacity: 0.8; }
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(12, 18, 34, 0.95);
      z-index: 10;
      padding: 24px;
      text-align: center;
    }
    .overlay.hidden { display: none; }
    .overlay-title { font-size: 1.25rem; font-weight: 600; color: #94a3b8; margin-bottom: 8px; }
    .overlay-sub { font-size: 0.875rem; color: #64748b; line-height: 1.5; margin-bottom: 24px; }
    .overlay-score { font-size: 2rem; font-weight: 700; color: #e2e8f0; margin: 8px 0; }
    .btn { padding: 10px 20px; border-radius: 6px; border: none; font-size: 0.875rem; font-weight: 500; font-family: inherit; cursor: pointer; transition: all 0.15s ease; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-secondary:hover { background: #475569; }
    .mode-btns { display: flex; gap: 12px; margin-bottom: 16px; }
    .lobby { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
    .lobby.hidden { display: none; }
    .code-display { padding: 16px; background: #1e293b; border-radius: 8px; font-size: 1.5rem; font-weight: 700; letter-spacing: 0.3em; color: #3b82f6; }
    .join-form { display: flex; gap: 8px; }
    .join-form input { flex: 1; padding: 10px 12px; border-radius: 6px; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .error { color: #ef4444; font-size: 0.8125rem; margin-top: 4px; }
    .status { font-size: 0.875rem; color: #94a3b8; min-height: 24px; }
    .status.your-turn { color: #3b82f6; }
    .status.enemy-turn { color: #f59e0b; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="header">
      <h1 class="title">Statki</h1>
      <div class="stats">
        <span>Strzały: <strong id="shots">0</strong></span>
        <span>Zatopione: <strong id="sunk">0</strong>/5</span>
      </div>
    </div>
    <div class="status" id="status"></div>
    <div class="boards">
      <div class="board-wrap">
        <span class="board-label">Twoje statki</span>
        <div class="board" id="playerBoard"></div>
      </div>
      <div class="board-wrap" id="enemyBoardWrap">
        <span class="board-label">Wrogi ocean</span>
        <div class="board" id="enemyBoard"></div>
      </div>
    </div>
  </div>

  <div class="overlay" id="modeOverlay">
    <p class="overlay-title">Statki</p>
    <p class="overlay-sub">Wybierz tryb gry</p>
    <div class="mode-btns">
      <button type="button" class="btn btn-primary" id="btnSingle">Single-player (vs AI)</button>
      <button type="button" class="btn btn-secondary" id="btnMulti">Multiplayer</button>
    </div>
  </div>

  <div class="overlay hidden" id="startOverlay">
    <p class="overlay-title">Statki</p>
    <p class="overlay-sub">Zatop wszystkie statki przeciwnika.<br>Kliknij w prawej planszy, aby strzelać.</p>
    <button type="button" class="btn btn-primary" id="btnStart">Rozpocznij grę</button>
  </div>

  <div class="overlay hidden" id="multiLobby">
    <p class="overlay-title">Multiplayer</p>
    <div class="lobby">
      <div class="mode-btns">
        <button type="button" class="btn btn-primary" id="btnCreate">Utwórz grę</button>
        <button type="button" class="btn btn-secondary" id="btnJoin">Dołącz do gry</button>
      </div>
      <div id="createSection" class="hidden">
        <p class="board-label">Kod do udostępnienia:</p>
        <div class="code-display" id="roomCode">—</div>
        <p class="board-label" style="margin-top:12px">Czekam na drugiego gracza…</p>
      </div>
      <div id="joinSection" class="hidden">
        <p class="board-label">Wpisz kod gry:</p>
        <div class="join-form">
          <input type="text" id="joinCode" placeholder="np. AB12" maxlength="4" autocomplete="off">
          <button type="button" class="btn btn-primary" id="btnDoJoin">Dołącz</button>
        </div>
        <p class="error" id="joinError"></p>
      </div>
    </div>
    <button type="button" class="btn btn-secondary" style="margin-top:20px" id="btnBackMode">Wstecz</button>
  </div>

  <div class="overlay hidden" id="gameOverOverlay">
    <p class="overlay-title" id="gameOverTitle">Koniec gry</p>
    <p class="overlay-score"><span id="finalScore">0</span></p>
    <button type="button" class="btn btn-primary" id="btnRestart">Graj ponownie</button>
  </div>

  <script>
    const GAME_ID = 'battleship';
    const SIZE = 10;
    const SHIPS = [5, 4, 3, 3, 2];

    let mode = null;
    let playerGrid = [], enemyGrid = [], playerHits = [], enemyHits = [];
    let shots = 0, sunkCount = 0, gameOver = false, playerTurn = true;
    let roomCode = null, role = null, pollInterval = null, shotPending = false;

    const playerBoard = document.getElementById('playerBoard');
    const enemyBoard = document.getElementById('enemyBoard');
    const statusEl = document.getElementById('status');
    const shotsEl = document.getElementById('shots');
    const sunkEl = document.getElementById('sunk');
    const modeOverlay = document.getElementById('modeOverlay');
    const startOverlay = document.getElementById('startOverlay');
    const multiLobby = document.getElementById('multiLobby');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const finalScoreEl = document.getElementById('finalScore');

    function csrf() { return decodeURIComponent((document.cookie.match(/XSRF-TOKEN=([^;]+)/) || [])[1] || ''); }
    function api(path, method = 'GET', body = null) {
      const opts = { method, headers: { 'Accept': 'application/json', 'X-XSRF-TOKEN': csrf() }, credentials: 'include' };
      if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
      return fetch('/games/battleship' + path, opts).then(r => r.json());
    }

    function createGrid() { return Array(SIZE).fill(null).map(() => Array(SIZE).fill(0)); }
    function canPlace(grid, row, col, len, horizontal) {
      const r = horizontal ? 1 : len, c = horizontal ? len : 1;
      for (let i = -1; i <= r; i++) for (let j = -1; j <= c; j++) {
        const nr = row + i, nc = col + j;
        if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && grid[nr][nc]) return false;
      }
      for (let k = 0; k < len; k++) {
        const nr = row + (horizontal ? 0 : k), nc = col + (horizontal ? k : 0);
        if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) return false;
      }
      return true;
    }
    function placeShip(grid, row, col, len, horizontal) {
      for (let k = 0; k < len; k++) {
        const nr = row + (horizontal ? 0 : k), nc = col + (horizontal ? k : 0);
        grid[nr][nc] = len;
      }
    }
    function placeShipsRandomly(grid) {
      for (const len of SHIPS) {
        let placed = false;
        for (let _ = 0; _ < 200 && !placed; _++) {
          const row = Math.floor(Math.random() * SIZE), col = Math.floor(Math.random() * SIZE);
          const horizontal = Math.random() < 0.5;
          if (canPlace(grid, row, col, len, horizontal)) { placeShip(grid, row, col, len, horizontal); placed = true; }
        }
      }
    }
    function isSunk(grid, hits, shipId) {
      let count = 0;
      for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++)
        if (grid[r][c] === shipId && hits.some(h => h[0] === r && h[1] === c)) count++;
      return count === shipId;
    }
    function countSunk(grid, hits) {
      const sunk = new Set();
      for (const [r, c] of hits) {
        const id = grid[r][c];
        if (id && isSunk(grid, hits, id)) sunk.add(id);
      }
      return sunk.size;
    }

    function normCoord(h) {
      const r = Array.isArray(h) ? h[0] : (h?.r ?? h?.row ?? 0);
      const c = Array.isArray(h) ? h[1] : (h?.c ?? h?.col ?? 0);
      return [parseInt(r, 10), parseInt(c, 10)];
    }

    function renderPlayerBoard() {
      playerBoard.innerHTML = '';
      const grid = Array.isArray(playerGrid) && playerGrid.length === SIZE ? playerGrid : createGrid();
      const hits = (enemyHits || []).map(normCoord);
      for (let r = 0; r < SIZE; r++) {
        const row = grid[r];
        const rowData = Array.isArray(row) ? row : Array(SIZE).fill(0);
        for (let c = 0; c < SIZE; c++) {
          const cell = document.createElement('div');
          const hasShip = (rowData[c] ?? 0) > 0;
          const isHit = hits.some(([hr, hc]) => hr === r && hc === c);
          cell.className = 'cell' + (hasShip ? ' ship' : ' water');
          if (isHit) cell.classList.add(hasShip ? 'hit' : 'miss');
          playerBoard.appendChild(cell);
        }
      }
    }

    function renderEnemyBoard(shotsData = null) {
      enemyBoard.innerHTML = '';
      const hits = shotsData || playerHits.map(h => ({ r: h[0], c: h[1], hit: enemyGrid[h[0]]?.[h[1]] > 0 }));
      for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell enemy';
        const shot = hits.find(h => (h.r ?? h[0]) === r && (h.c ?? h[1]) === c);
        if (shot) {
          cell.classList.add(shot.hit ? 'hit' : 'miss');
          cell.classList.add('disabled');
        }
        cell.dataset.r = r;
        cell.dataset.c = c;
        cell.addEventListener('click', () => attack(r, c));
        enemyBoard.appendChild(cell);
      }
    }

    function attack(r, c) {
      if (!playerTurn || gameOver || shotPending) return;
      const already = playerHits.some(h => (h[0] ?? h.r) === r && (h[1] ?? h.c) === c);
      if (already) return;
      if (mode === 'multi') {
        shotPending = true;
        api('/rooms/' + roomCode + '/shot', 'POST', { row: r, col: c }).then(data => {
          shotPending = false;
          if (data.room) applyRoomState(data.room);
        }).catch(() => { shotPending = false; });
        return;
      }

      playerHits.push([r, c]);
      shots++;
      shotsEl.textContent = shots;
      sunkCount = countSunk(enemyGrid, playerHits);
      sunkEl.textContent = sunkCount;

      if (sunkCount === 5) { endGame(true); return; }

      playerTurn = false;
      statusEl.textContent = 'Strzał przeciwnika…';
      statusEl.className = 'status enemy-turn';
      document.getElementById('enemyBoardWrap').classList.add('disabled');
      setTimeout(aiAttack, 500 + Math.random() * 500);
    }

    function aiAttack() {
      const available = [];
      for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++)
        if (!enemyHits.some(h => h[0] === r && h[1] === c)) available.push([r, c]);
      const [r, c] = available[Math.floor(Math.random() * available.length)];
      enemyHits.push([r, c]);

      if (countSunk(playerGrid, enemyHits) === 5) { endGame(false); return; }

      playerTurn = true;
      statusEl.textContent = 'Twój ruch';
      statusEl.className = 'status your-turn';
      document.getElementById('enemyBoardWrap').classList.remove('disabled');
      renderPlayerBoard();
      renderEnemyBoard();
    }

    function endGame(won) {
      gameOver = true;
      playerTurn = false;
      gameOverOverlay.classList.remove('hidden');
      document.getElementById('gameOverTitle').textContent = won ? 'Zwycięstwo!' : 'Przegrana';
      const score = won ? Math.max(0, 100 - shots) : 0;
      finalScoreEl.textContent = score;

      if (mode === 'single') {
        fetch('/games/scores', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json', 'X-XSRF-TOKEN': csrf() },
          credentials: 'include',
          body: JSON.stringify({ game_id: GAME_ID, score })
        }).then(() => { try { window.parent.postMessage({ type: 'gameScoreSubmitted', gameId: GAME_ID, score }, '*'); } catch (_) {} }).catch(() => {});
      }

      renderPlayerBoard();
      renderEnemyBoard();
    }

    function ensure2DGrid(val) {
      if (!val || typeof val !== 'object') return createGrid();
      const rows = Array.isArray(val) ? val : Object.keys(val).sort((a,b)=>+a - +b).map(k => val[k]);
      if (rows.length !== SIZE) return createGrid();
      const out = [];
      for (let r = 0; r < SIZE; r++) {
        const row = rows[r];
        const arr = Array.isArray(row) ? row : (typeof row === 'object' ? Object.keys(row).sort((a,b)=>+a - +b).map(k => row[k]) : []);
        out.push(Array.from({ length: SIZE }, (_, c) => (arr[c] ?? 0) | 0));
      }
      return out;
    }

    function applyRoomState(room) {
      playerGrid = ensure2DGrid(room.my_ships);
      enemyHits = (room.enemy_hits || []).map(normCoord);
      const myShots = room.my_shots || [];
      playerHits = myShots.map(s => [s.r ?? s[0], s.c ?? s[1]]);
      shots = playerHits.length;
      sunkCount = room.my_sunk_count ?? 0;
      shotsEl.textContent = shots;
      sunkEl.textContent = sunkCount;

      playerTurn = room.is_your_turn;
      gameOver = room.status === 'finished';

      statusEl.className = 'status';
      if (room.status === 'waiting') { statusEl.textContent = 'Czekam na drugiego gracza…'; statusEl.classList.add('enemy-turn'); }
      else if (room.status === 'finished') {
        if (pollInterval) clearInterval(pollInterval);
        const won = room.winner_id && ((role === 'player1' && room.winner_id === room.player1?.id) || (role === 'player2' && room.winner_id === room.player2?.id));
        statusEl.textContent = won ? 'Wygrałeś!' : 'Przegrałeś.';
        statusEl.classList.add(won ? 'your-turn' : 'enemy-turn');
        gameOverOverlay.classList.remove('hidden');
        document.getElementById('gameOverTitle').textContent = won ? 'Zwycięstwo!' : 'Przegrana';
        finalScoreEl.textContent = won ? Math.max(0, 100 - shots) : 0;
      } else {
        statusEl.textContent = room.is_your_turn ? 'Twój ruch' : 'Ruch przeciwnika…';
        statusEl.classList.add(room.is_your_turn ? 'your-turn' : 'enemy-turn');
      }

      document.getElementById('enemyBoardWrap').classList.toggle('disabled', !room.is_your_turn || gameOver);

      renderPlayerBoard();
      renderEnemyBoard(myShots);
    }

    function initSingle() {
      mode = 'single';
      document.getElementById('enemyBoardWrap').classList.remove('disabled');
      playerGrid = createGrid();
      enemyGrid = createGrid();
      playerHits = [];
      enemyHits = [];
      shots = 0;
      sunkCount = 0;
      gameOver = false;
      playerTurn = true;
      placeShipsRandomly(playerGrid);
      placeShipsRandomly(enemyGrid);
      shotsEl.textContent = '0';
      sunkEl.textContent = '0';
      statusEl.textContent = 'Twój ruch';
      statusEl.className = 'status your-turn';
      renderPlayerBoard();
      renderEnemyBoard();
    }

    document.getElementById('btnSingle').addEventListener('click', () => {
      modeOverlay.classList.add('hidden');
      startOverlay.classList.remove('hidden');
    });

    document.getElementById('btnMulti').addEventListener('click', () => {
      modeOverlay.classList.add('hidden');
      multiLobby.classList.remove('hidden');
    });

    document.getElementById('btnStart').addEventListener('click', () => {
      startOverlay.classList.add('hidden');
      initSingle();
    });

    document.getElementById('btnBackMode').addEventListener('click', () => {
      multiLobby.classList.add('hidden');
      modeOverlay.classList.remove('hidden');
    });

    document.getElementById('btnCreate').addEventListener('click', () => {
      if (pollInterval) clearInterval(pollInterval);
      document.getElementById('createSection').classList.remove('hidden');
      document.getElementById('joinSection').classList.add('hidden');
      document.getElementById('joinError').textContent = '';
      api('/rooms', 'POST').then(data => {
        if (data.room) {
          roomCode = data.room.code;
          role = 'player1';
          document.getElementById('roomCode').textContent = data.room.code;
          pollInterval = setInterval(() => {
            api('/rooms/' + roomCode).then(res => {
              if (res.room && res.room.status === 'playing') {
                clearInterval(pollInterval);
                multiLobby.classList.add('hidden');
                mode = 'multi';
                applyRoomState(res.room);
                pollInterval = setInterval(() => api('/rooms/' + roomCode).then(r => r.room && applyRoomState(r.room)), 1500);
              }
            });
          }, 1500);
        }
      });
    });

    document.getElementById('btnJoin').addEventListener('click', () => {
      if (pollInterval) clearInterval(pollInterval);
      document.getElementById('joinSection').classList.remove('hidden');
      document.getElementById('createSection').classList.add('hidden');
      document.getElementById('joinError').textContent = '';
    });

    document.getElementById('btnDoJoin').addEventListener('click', () => {
      const code = document.getElementById('joinCode').value.trim().toUpperCase();
      if (!code || code.length !== 4) { document.getElementById('joinError').textContent = 'Wpisz 4-znakowy kod'; return; }
      document.getElementById('joinError').textContent = '';
      api('/rooms/' + code + '/join', 'POST').then(data => {
        if (data.room) {
          roomCode = data.room.code;
          role = data.role;
          multiLobby.classList.add('hidden');
          mode = 'multi';
          applyRoomState(data.room);
          pollInterval = setInterval(() => api('/rooms/' + roomCode).then(r => r.room && applyRoomState(r.room)), 1500);
        } else if (data.message) document.getElementById('joinError').textContent = data.message;
      });
    });

    document.getElementById('joinCode').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('btnDoJoin').click(); });

    document.getElementById('btnRestart').addEventListener('click', () => {
      gameOverOverlay.classList.add('hidden');
      if (mode === 'single') initSingle();
      else { if (pollInterval) clearInterval(pollInterval); multiLobby.classList.remove('hidden'); modeOverlay.classList.remove('hidden'); }
    });

    playerBoard.innerHTML = '';
    enemyBoard.innerHTML = '';
  </script>
</body>
</html>
