<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Platformówka</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0c1222;
      color: #e4e8f0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .game-wrapper { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .header { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 640px; }
    .title { font-size: 1.25rem; font-weight: 600; color: #94a3b8; }
    .score-display { font-size: 0.875rem; font-weight: 500; color: #64748b; }
    .score-display span { color: #fbbf24; font-weight: 600; }
    .arena {
      position: relative;
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.4);
    }
    #game-container { display: block; }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(12, 18, 34, 0.92);
      text-align: center;
      padding: 32px;
    }
    .overlay.hidden { display: none; }
    .overlay-title { font-size: 1.25rem; font-weight: 600; color: #94a3b8; margin-bottom: 8px; }
    .overlay-sub { font-size: 0.875rem; color: #64748b; line-height: 1.5; margin-bottom: 24px; }
    .overlay-score { font-size: 2rem; font-weight: 700; color: #fbbf24; margin: 8px 0; }
    .btn {
      padding: 12px 24px;
      border-radius: 6px;
      border: none;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .hint { font-size: 0.75rem; color: #64748b; }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="header">
      <h1 class="title">Platformówka</h1>
      <div class="score-display">Monety: <span id="score">0</span></div>
    </div>
    <div class="arena" style="position:relative">
      <div id="game-container"></div>
      <div class="overlay" id="startHint">
        <p class="overlay-title">Gotowy?</p>
        <p class="overlay-sub">Strzałki / WASD – ruch<br>Spacja – skok</p>
        <p class="overlay-sub" style="margin-bottom:16px">Zbieraj monety, unikaj cierni!</p>
        <button type="button" class="btn btn-primary" id="btnStart">Start</button>
      </div>
      <div class="overlay hidden" id="gameOver">
        <p class="overlay-title">Koniec gry</p>
        <p class="overlay-score"><span id="finalScore">0</span> monet</p>
        <button type="button" class="btn btn-primary" id="btnRestart">Graj ponownie</button>
      </div>
    </div>
    <p class="hint">Strzałki / WASD – ruch | Spacja – skok</p>
  </div>

  <script>
    const GAME_ID = 'platformer';

    const config = {
      type: Phaser.AUTO,
      parent: 'game-container',
      width: 640,
      height: 360,
      physics: {
        default: 'arcade',
        arcade: { gravity: { y: 800 }, debug: false }
      },
      scene: {
        preload: preload,
        create: create,
        update: update
      }
    };

    let game, player, platforms, coins, spikes, score = 0, scoreText, cursors, wasd;
    let gameStarted = false, gameOver = false;

    function preload() {}

    function create() {
      this.add.rectangle(320, 180, 640, 360, 0x1e3a5f);
      for (let i = 0; i < 20; i++) {
        this.add.rectangle(Math.random() * 640, Math.random() * 360, 4, 4, 0x334155).setAlpha(0.3);
      }

      platforms = this.physics.add.staticGroup();
      const groundData = [
        [0, 340, 700, 40], [160, 280, 120, 20], [400, 260, 140, 20],
        [80, 200, 100, 20], [320, 180, 160, 20], [520, 220, 80, 20],
        [200, 120, 100, 20], [450, 100, 120, 20], [100, 60, 80, 20]
      ];
      groundData.forEach(([x, y, w, h]) => {
        const p = this.add.rectangle(x, y, w, h, 0x22c55e);
        platforms.add(p);
      });

      player = this.physics.add.rectangle(80, 280, 24, 36, 0x3b82f6);
      player.setCollideWorldBounds(true);
      player.setBounce(0.1);
      this.physics.add.collider(player, platforms);

      coins = this.physics.add.group();
      [[200, 240], [360, 140], [520, 180], [120, 160], [280, 80]].forEach(([x, y]) => {
        const c = this.add.circle(x, y, 10, 0xfbbf24);
        this.physics.add.existing(c, true);
        c.body.setCircle(10);
        c.body.setAllowGravity(false);
        coins.add(c);
      });
      this.physics.add.overlap(player, coins, collectCoin, null, this);

      spikes = this.physics.add.group();
      [[300, 320], [480, 300], [180, 100]].forEach(([x, y]) => {
        const s = this.physics.add.rectangle(x, y, 24, 24, 0xef4444);
        s.setImmovable(true);
        spikes.add(s);
      });
      this.physics.add.overlap(player, spikes, hitSpike, null, this);

      cursors = this.input.keyboard.createCursorKeys();
      wasd = this.input.keyboard.addKeys('W,A,S,D');
      this.input.keyboard.on('keydown-SPACE', () => { if (gameStarted && !gameOver) player.setVelocityY(-420); });

      scoreText = this.add.text(16, 16, '0', { fontSize: '18px', color: '#fbbf24' });
      scoreText.setScrollFactor(0);

      document.getElementById('btnStart').onclick = () => {
        document.getElementById('startHint').classList.add('hidden');
        gameStarted = true;
      };
    }

    function collectCoin(playerObj, coinObj) {
      coinObj.destroy();
      score++;
      scoreText.setText(score);
      document.getElementById('score').textContent = score;
    }

    function hitSpike() {
      if (gameOver) return;
      gameOver = true;
      document.getElementById('finalScore').textContent = score;
      document.getElementById('gameOver').classList.remove('hidden');

      const csrf = decodeURIComponent((document.cookie.match(/XSRF-TOKEN=([^;]+)/) || [])[1] || '');
      fetch('/games/scores', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json', 'X-XSRF-TOKEN': csrf },
        credentials: 'include',
        body: JSON.stringify({ game_id: GAME_ID, score })
      }).then(() => {
        try { window.parent.postMessage({ type: 'gameScoreSubmitted', gameId: GAME_ID, score }, '*'); } catch (_) {}
      }).catch(() => {});
    }

    function update() {
      if (!gameStarted || gameOver) return;
      if (cursors.left.isDown || (wasd && wasd.A.isDown)) {
        player.setVelocityX(-200);
      } else if (cursors.right.isDown || (wasd && wasd.D.isDown)) {
        player.setVelocityX(200);
      } else {
        player.setVelocityX(0);
      }
      if ((cursors.up.isDown || (wasd && wasd.W.isDown)) && player.body.touching.down) {
        player.setVelocityY(-420);
      }
    }

    game = new Phaser.Game(config);

    document.getElementById('btnRestart').onclick = () => {
      document.getElementById('gameOver').classList.add('hidden');
      gameOver = false;
      score = 0;
      game.scene.restart();
      document.getElementById('score').textContent = '0';
      gameStarted = true;
    };
  </script>
</body>
</html>
