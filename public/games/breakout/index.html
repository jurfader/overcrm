<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Breakout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0c1222;
      color: #e4e8f0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .game-wrapper { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 480px;
    }
    .title { font-size: 1.25rem; font-weight: 600; color: #94a3b8; letter-spacing: -0.02em; }
    .stats { display: flex; gap: 24px; font-size: 0.875rem; font-weight: 500; color: #64748b; }
    .stats span { color: #e2e8f0; font-weight: 600; }
    .arena {
      position: relative;
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
    }
    #gameCanvas { display: block; background: #0f172a; }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.95);
      text-align: center;
      padding: 32px;
    }
    .overlay.hidden { display: none; }
    .overlay-title { font-size: 1.125rem; font-weight: 600; color: #94a3b8; margin-bottom: 8px; }
    .overlay-sub { font-size: 0.8125rem; color: #64748b; line-height: 1.5; margin-bottom: 24px; }
    .overlay-score { font-size: 2.5rem; font-weight: 700; color: #e2e8f0; letter-spacing: -0.03em; margin: 8px 0 24px; }
    .btn {
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="header">
      <h1 class="title">Breakout</h1>
      <div class="stats">
        <span>Wynik: <strong id="score">0</strong></span>
        <span>Życia: <strong id="lives">3</strong></span>
      </div>
    </div>
    <div class="arena">
      <canvas id="gameCanvas" width="480" height="400"></canvas>
      <div class="overlay" id="startHint">
        <p class="overlay-title">Rozbij klocki</p>
        <p class="overlay-sub">Ruch myszką lub strzałkami.<br>Odbij piłkę paletką.</p>
        <p class="overlay-sub" style="margin-bottom:0; font-size:0.75rem; opacity:0.8">Kliknij aby zacząć</p>
      </div>
      <div class="overlay hidden" id="gameOver">
        <p class="overlay-title">Koniec gry</p>
        <p class="overlay-score"><span id="finalScore">0</span></p>
        <button type="button" class="btn btn-primary" id="restart">Graj ponownie</button>
      </div>
    </div>
  </div>

  <script>
    const GAME_ID = 'breakout';
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const W = 480, H = 400;
    const PADDLE_W = 90, PADDLE_H = 12;
    const BALL_R = 6;
    const BRICK_W = 48, BRICK_H = 20;
    const COLS = 10, ROWS = 5;
    const COLORS = ['#ef4444', '#f59e0b', '#eab308', '#22c55e', '#3b82f6'];

    let paddle = { x: W/2 - PADDLE_W/2, y: H - 40 };
    let ball = { x: W/2, y: H - 60, vx: 4, vy: -4 };
    let bricks = [];
    let score = 0;
    let lives = 3;
    let gameLoop = null;
    let gameStarted = false;
    let mouseX = W/2;

    const startHintEl = document.getElementById('startHint');
    const gameOverEl = document.getElementById('gameOver');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const finalScoreEl = document.getElementById('finalScore');
    const restartBtn = document.getElementById('restart');

    function initBricks() {
      bricks = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          bricks.push({
            x: c * BRICK_W + 4,
            y: r * BRICK_H + 30,
            w: BRICK_W - 4,
            h: BRICK_H - 4,
            color: COLORS[r % COLORS.length],
            alive: true
          });
        }
      }
    }

    function drawPaddle() {
      ctx.fillStyle = '#64748b';
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(paddle.x, paddle.y, PADDLE_W, PADDLE_H, 6);
      else ctx.rect(paddle.x, paddle.y, PADDLE_W, PADDLE_H);
      ctx.fill();
      ctx.strokeStyle = '#475569';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function drawBall() {
      ctx.fillStyle = '#e2e8f0';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#94a3b8';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function drawBricks() {
      bricks.forEach(b => {
        if (!b.alive) return;
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.lineWidth = 1;
        ctx.strokeRect(b.x, b.y, b.w, b.h);
      });
    }

    function tick() {
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, W, H);

      drawBricks();
      drawPaddle();
      drawBall();

      if (!gameStarted) return;

      paddle.x = mouseX - PADDLE_W/2;
      paddle.x = Math.max(0, Math.min(W - PADDLE_W, paddle.x));

      ball.x += ball.vx;
      ball.y += ball.vy;

      if (ball.x - BALL_R < 0 || ball.x + BALL_R > W) ball.vx *= -1;
      if (ball.y - BALL_R < 0) ball.vy *= -1;

      if (ball.y + BALL_R > paddle.y && ball.y - BALL_R < paddle.y + PADDLE_H &&
          ball.x > paddle.x && ball.x < paddle.x + PADDLE_W) {
        ball.vy = -Math.abs(ball.vy);
        const hitPos = (ball.x - paddle.x) / PADDLE_W;
        ball.vx = (hitPos - 0.5) * 8;
      }

      if (ball.y + BALL_R > H) {
        lives--;
        livesEl.textContent = lives;
        if (lives <= 0) return endGame();
        ball = { x: W/2, y: H - 60, vx: 4, vy: -4 };
        gameStarted = false;
        setTimeout(() => { gameStarted = true; }, 500);
      }

      bricks.forEach(b => {
        if (!b.alive) return;
        if (ball.x + BALL_R > b.x && ball.x - BALL_R < b.x + b.w &&
            ball.y + BALL_R > b.y && ball.y - BALL_R < b.y + b.h) {
          b.alive = false;
          ball.vy *= -1;
          score += 10;
          scoreEl.textContent = score;
        }
      });

      if (bricks.every(b => !b.alive)) {
        initBricks();
        ball.vy *= 1.05;
        ball.vx *= 1.02;
      }
    }

    function endGame() {
      clearInterval(gameLoop);
      gameLoop = null;
      gameStarted = false;
      finalScoreEl.textContent = score;
      gameOverEl.classList.remove('hidden');

      const csrf = decodeURIComponent((document.cookie.match(/XSRF-TOKEN=([^;]+)/) || [])[1] || '');
      fetch('/games/scores', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json', 'X-XSRF-TOKEN': csrf },
        credentials: 'include',
        body: JSON.stringify({ game_id: GAME_ID, score })
      }).then(() => {
        try { window.parent.postMessage({ type: 'gameScoreSubmitted', gameId: GAME_ID, score }, '*'); } catch (_) {}
      }).catch(() => {});
    }

    function resetGame() {
      startHintEl.classList.remove('hidden');
      gameOverEl.classList.add('hidden');
      paddle = { x: W/2 - PADDLE_W/2, y: H - 40 };
      ball = { x: W/2, y: H - 60, vx: 4, vy: -4 };
      score = 0;
      lives = 3;
      scoreEl.textContent = '0';
      livesEl.textContent = '3';
      initBricks();
    }

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouseX = ((e.clientX - rect.left) / rect.width) * W;
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') mouseX = Math.max(PADDLE_W/2, mouseX - 20);
      if (e.key === 'ArrowRight') mouseX = Math.min(W - PADDLE_W/2, mouseX + 20);
      if (e.key === ' ' && !gameOverEl.classList.contains('hidden')) restartBtn.click();
    });

    restartBtn.addEventListener('click', () => {
      resetGame();
      startHintEl.classList.add('hidden');
      gameStarted = true;
      gameLoop = setInterval(tick, 1000/60);
    });

    function handleStartClick(e) {
      if (!gameStarted && !startHintEl.classList.contains('hidden')) {
        e.stopPropagation();
        startHintEl.classList.add('hidden');
        gameStarted = true;
        if (!gameLoop) gameLoop = setInterval(tick, 1000/60);
      }
    }
    canvas.addEventListener('click', handleStartClick);
    startHintEl.addEventListener('click', handleStartClick);

    initBricks();
    gameLoop = setInterval(tick, 1000/60);
  </script>
</body>
</html>
